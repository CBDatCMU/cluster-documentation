name: Build and Release PDF Documentation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install requests

      - name: Install LaTeX dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            texlive-xetex \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            fonts-dejavu \
            latexmk

      - name: Build PDF documentation
        run: make -C docs latexpdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get build date
        id: meta
        run: echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Delete previous PDF releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName --jq '.[].tagName' \
            | grep '^pdf-' \
            | while read tag; do
                echo "Deleting release and tag: $tag"
                gh release delete "$tag" --yes --cleanup-tag
              done

      - name: Create new release and upload artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE="${{ steps.meta.outputs.date }}"
          gh release create "pdf-${DATE}" \
            --title "${DATE}" \
            --notes "PDF documentation build from $(date -u '+%Y-%m-%d %H:%M UTC')" \
            docs/build/latex/rayandstephanielanecluster.pdf

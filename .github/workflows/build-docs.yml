name: Build and Release HTML Documentation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install requests

      - name: Build HTML documentation
        run: make -C docs html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create ZIP archive
        id: zip
        run: |
          DATE="$(date +%Y-%m-%d)"
          ZIPFILE="build-${DATE}.zip"
          cd docs/build
          zip -r "../../${ZIPFILE}" html/
          echo "zipfile=${ZIPFILE}" >> "$GITHUB_OUTPUT"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"

      - name: Delete previous docs releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName --jq '.[].tagName' \
            | grep '^docs-' \
            | while read tag; do
                echo "Deleting release and tag: $tag"
                gh release delete "$tag" --yes --cleanup-tag
              done

      - name: Create new release and upload artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE="${{ steps.zip.outputs.date }}"
          ZIPFILE="${{ steps.zip.outputs.zipfile }}"
          gh release create "docs-${DATE}" \
            --title "${DATE}" \
            --notes "HTML documentation build from $(date -u '+%Y-%m-%d %H:%M UTC')" \
            "${ZIPFILE}"
